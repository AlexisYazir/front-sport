## Netlify Configuration File
## Configuración para despliegue Angular en Netlify

[build]
  # Comando de compilación
  command = "npm run build:prod"

  # Directorio generado por Angular
  publish = "dist/ecommerce-app/browser"

[build.environment]
  # Forzamos instalación de devDependencies
  NODE_ENV = "development"
  NODE_VERSION = "22"

## ================================
## Redirects SPA (Angular Router)
## ================================
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

## ================================
## Headers Globales
## ================================
[[headers]]
  for = "/*"
  [headers.values]

    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://accounts.google.com https://apis.google.com;
      script-src-elem 'self' 'unsafe-inline' 'unsafe-eval' https://accounts.google.com https://apis.google.com;
      worker-src 'self' blob:;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com data:;
      img-src 'self' data: https: blob:;
      connect-src 'self' https://back-sport-ghxk.onrender.com https://accounts.google.com https://www.googleapis.com https://oauthaccountmanager.googleapis.com https://api.maptiler.com https://*.maptiler.com;
      frame-src 'self' https://accounts.google.com;
      object-src 'none';
      base-uri 'self';
      form-action 'self';
      upgrade-insecure-requests;
    """

    Permissions-Policy = """
      accelerometer=(),
      camera=(),
      geolocation=(),
      gyroscope=(),
      magnetometer=(),
      microphone=(),
      payment=(),
      usb=(),
      interest-cohort=()
    """

    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

    Cross-Origin-Embedder-Policy = "unsafe-none"
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    Cross-Origin-Resource-Policy = "cross-origin"

    Cache-Control = "public, max-age=3600"

## ================================
## Cache fuerte para assets
## ================================
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

## ================================
## No cachear index.html
## ================================
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
