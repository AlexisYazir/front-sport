<div
  class="dashboard-theme min-h-screen bg-gray-50"
  [class.dashboard-theme-dark]="preferences.isDarkTheme()"
  [class.dashboard-reduced-motion]="preferences.reducedMotion()">
  <div class="flex">
    <aside
      [class.w-52]="sidebarOpen()"
      [class.w-16]="!sidebarOpen()"
      [class.top-16]="!navbarOculto()"
      [class.top-0]="navbarOculto()"
      class="dashboard-sidebar bg-white shadow-md border-r border-gray-200 fixed left-0 bottom-0 transition-all duration-300 z-20 overflow-hidden flex flex-col">

      <div class="flex items-center justify-between px-3 py-4 border-b border-gray-100 shrink-0">
        <div *ngIf="sidebarOpen()" class="flex items-center gap-2">
          <div class="w-1 h-5 bg-[#0367A6] rounded-full"></div>
          <span class="font-semibold text-[#202020] text-sm uppercase tracking-[0.2em]">
            Menú
          </span>
        </div>

        <button
          type="button"
          (click)="toggleSidebar()"
          class="flex items-center justify-center px-2 py-2 rounded-xl text-sm text-[#666666] transition-all duration-200 hover:bg-[#d8ecf9]"
          [class.mx-auto]="!sidebarOpen()"
          [matTooltip]="sidebarOpen() ? 'Contraer menú' : 'Expandir menú'"
          matTooltipClass="admin-tooltip"
          matTooltipPosition="right">
          <span class="material-symbols-outlined text-xl">
            {{ sidebarOpen() ? 'chevron_left' : 'chevron_right' }}
          </span>
        </button>
      </div>

      <nav class="flex-1 min-h-0 flex flex-col">
        <div class="dashboard-sidebar-scroll flex-1 min-h-0 overflow-y-auto overflow-x-hidden">
          <ul class="py-2 px-2 space-y-1">
            <li *ngFor="let item of menuItems">
              <a
                [routerLink]="item.route"
                routerLinkActive="bg-[#0367A6] text-white shadow-sm"
                class="group flex items-center gap-3 px-3 py-2.5 rounded-lg cursor-pointer transition-all duration-200 text-sm"
                [class.text-white]="isActive(item.route)"
                [class.text-[#666666]]="!isActive(item.route)"
                [class.hover:bg-[#0367A6]/10]="!isActive(item.route)"
                [class.hover:text-[#0367A6]]="!isActive(item.route)"
                [matTooltip]="item.label"
                matTooltipClass="admin-tooltip"
                [matTooltipDisabled]="sidebarOpen()"
                matTooltipPosition="right">

                <span
                  class="material-symbols-outlined text-xl transition-colors duration-200"
                  [class.text-white]="isActive(item.route)"
                  [class.group-hover:text-[#0367A6]]="!isActive(item.route)">
                  {{ item.icon }}
                </span>

                <span *ngIf="sidebarOpen()" class="font-medium whitespace-nowrap">
                  {{ item.label }}
                </span>
              </a>
            </li>
          </ul>
        </div>
      </nav>
    </aside>

    <main
      [class.ml-52]="sidebarOpen()"
      [class.ml-16]="!sidebarOpen()"
      [class.pt-2]="!navbarOculto()"
      [class.pt-0]="navbarOculto()"
      class="flex-1 p-2 transition-all duration-300 overflow-y-auto h-screen">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
